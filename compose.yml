services:
  redis:
    image: redis:latest
    container_name: redis-container
    restart: unless-stopped
    ports:
      - "6379:6379"
  postgres: 
    image: postgres:15 
    restart: always
    environment: 
      - POSTGRES_DB=it-blog 
      - POSTGRES_USER=alex
      - POSTGRES_PASSWORD=root
    ports: 
      - "5432:5432"
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U alex -d it-blog"]
      interval: 5s 
      timeout: 2s 
      retries: 20 
    volumes: 
      - postgres_data:/var/lib/postgresql/data 
    command: postgres -c listen_addresses='*' 
    logging: 
      options: 
        max-size: "10m"
        max-file: "3"

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: famin1l@yandex.ru
      PGADMIN_DEFAULT_PASSWORD: root
    depends_on:
      - postgres

