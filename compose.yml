services:
  redis:
    image: redis:latest
    container_name: redis-container
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
     test: ["CMD", "redis-cli", "ping"]
     interval: 10s
     timeout: 5s
     retries: 5
    volumes:
     - redis_data:/data

  postgres: 
    image: postgres:15 
    restart: always
    environment: 
      - POSTGRES_DB=it-blog 
      - POSTGRES_USER=alex
      - POSTGRES_PASSWORD=root
    ports: 
      - "5432:5432"
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U alex -d it-blog"]
      interval: 5s 
      timeout: 2s 
      retries: 20 
    volumes: 
      - postgres_data:/var/lib/postgresql/data 
    command: postgres -c listen_addresses='*' 
    logging: 
      options: 
        max-size: "10m"alex
        max-file: "3"

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: famin1l@yandex.ru
      PGADMIN_DEFAULT_PASSWORD: root
    depends_on:
      - postgres

  backend: 
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3005:3005"
    env_file: 
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://alex:root@postgres:5432/it-blog?schema=public
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy 
      redis:
        condition: service_healthy
    volumes:
      - ./prisma:/app/prisma

volumes:
  postgres_data:
  redis_data:
